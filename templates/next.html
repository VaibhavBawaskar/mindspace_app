<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Recording — Mind Space</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />

  <style>
    :root {
      --primary: #6366f1;
      --secondary: #a855f7;
      --accent: #f43f5e;
    }

    /* ── Animated Mesh Gradient Background ── */
    body {
      margin: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      background: linear-gradient(45deg, #e0e7ff, #fae8ff, #f1f5f9);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ── Glassmorphism Card ── */
    .page-wrap {
      max-width: 500px;
      width: 90%;
      padding: 3rem;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 2.5rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
      text-align: center;
      animation: slideUp 0.8s ease-out;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .heading h3 { font-weight: 800; letter-spacing: -1px; color: #1e293b; }
    .heading p { color: #64748b; font-size: 0.9rem; margin-bottom: 2rem; }

    /* ── Neon Viewfinder ── */
    .viewfinder {
      position: relative;
      width: 100%;
      aspect-ratio: 1/1; /* Square look is more modern */
      background: #000;
      border-radius: 2rem;
      overflow: hidden;
      box-shadow: 0 0 0 5px #fff, 0 20px 40px rgba(99, 102, 241, 0.2);
      margin-bottom: 1.5rem;
      border: 2px solid transparent;
      transition: all 0.5s ease;
    }

    /* Recording State Border Animation */
    .viewfinder.is-recording {
      box-shadow: 0 0 0 5px #fff, 0 0 20px var(--accent);
      border-color: var(--accent);
      transform: scale(1.02);
    }

    #preview { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

    /* ── REC Badge ── */
    .rec-badge {
      position: absolute; top: 1.5rem; left: 1.5rem;
      background: rgba(244, 63, 94, 0.9);
      color: white; padding: 0.5rem 1rem; border-radius: 1rem;
      font-size: 0.7rem; font-weight: 800; display: flex; align-items: center; gap: 0.5rem;
      opacity: 0; visibility: hidden; transition: 0.3s;
    }
    .rec-badge.visible { opacity: 1; visibility: visible; }

    .rec-dot {
      width: 10px; height: 10px; border-radius: 50%; background: white;
      animation: pulse 1s infinite;
    }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

    /* ── Floating Countdown ── */
    #countdown-overlay {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      font-size: 8rem; font-weight: 900; color: white;
      background: rgba(99, 102, 241, 0.3);
      opacity: 0; transition: 0.3s; pointer-events: none;
    }
    #countdown-overlay.visible { opacity: 1; }

    /* ── Premium Buttons ── */
    .btn-main {
      padding: 1rem 2rem; border-radius: 1.2rem; font-weight: 700;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: none; width: 100%;
    }

    .btn-rec {
      background: linear-gradient(135deg, var(--accent), #e11d48);
      color: white; box-shadow: 0 10px 20px rgba(244, 63, 94, 0.3);
    }
    .btn-rec:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(244, 63, 94, 0.4); }

    .btn-submit {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white; box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
    }

    .btn-retry { background: #f1f5f9; color: #64748b; margin-top: 10px; }

    /* ── Progress Bar ── */
    .progress-container { height: 10px; background: #f1f5f9; border-radius: 10px; margin: 1rem 0; overflow: hidden; }
    .progress-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      transition: width 0.3s linear;
    }

  </style>
</head>
<body>

<div class="page-wrap">
  <div class="heading">
    <h3>Selfie Video</h3>
    <p>Just a quick 5-second check-in!</p>
  </div>

  <div class="viewfinder" id="viewfinder">
    <video id="preview" autoplay muted playsinline></video>
    <div class="rec-badge" id="recBadge"><div class="rec-dot"></div> RECORDING</div>
    <div id="countdown-overlay"></div>
  </div>

  <div id="progressWrap" style="display:none;">
    <div class="progress-container"><div class="progress-fill" id="progressBar"></div></div>
  </div>

  <div id="start-group">
    <p id="pre-status" class="small fw-bold text-primary mb-3">Initializing Camera...</p>
    <button class="btn-main btn-rec" id="startBtn" disabled>⏺ START RECORDING</button>
  </div>

  <div id="playback-wrap" style="display:none;">
    <video id="playback" controls style="width:100%; border-radius:1.5rem; margin-bottom:1rem;"></video>
    <button class="btn-main btn-submit" id="submitBtn">YES, SEND IT! 🚀</button>
    <button class="btn-main btn-retry" id="retryBtn">Re-record</button>
  </div>

  <div class="upload-status mt-3 fw-bold text-primary" id="uploadStatus"></div>
</div>

<script>
  const preview = document.getElementById("preview");
  const viewfinder = document.getElementById("viewfinder");
  const recBadge = document.getElementById("recBadge");
  const countdownEl = document.getElementById("countdown-overlay");
  const startBtn = document.getElementById("startBtn");
  const progressBar = document.getElementById("progressBar");
  const progressWrap = document.getElementById("progressWrap");
  const playbackWrap = document.getElementById("playback-wrap");
  const startGroup = document.getElementById("start-group");
  const uploadStatus = document.getElementById("uploadStatus");

  let stream, mediaRec, chunks = [], videoBlob;
  const DURATION = 5;

  async function init() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
      preview.srcObject = stream;
      startBtn.disabled = false;
      document.getElementById("pre-status").textContent = "Ready to Glow! ✨";
    } catch (e) { document.getElementById("pre-status").textContent = "Camera error ❌"; }
  }

  startBtn.onclick = () => {
    chunks = [];
    startGroup.style.display = "none";
    progressWrap.style.display = "block";
    viewfinder.classList.add("is-recording");
    recBadge.classList.add("visible");

    mediaRec = new MediaRecorder(stream);
    mediaRec.ondataavailable = e => chunks.push(e.data);
    mediaRec.onstop = () => {
      videoBlob = new Blob(chunks, { type: "video/webm" });
      document.getElementById("playback").src = URL.createObjectURL(videoBlob);
      playbackWrap.style.display = "block";
      viewfinder.style.display = "none";
      progressWrap.style.display = "none";
    };
    mediaRec.start();

    let rem = DURATION;
    countdownEl.classList.add("visible");
    countdownEl.textContent = rem;

    const timer = setInterval(() => {
      rem--;
      countdownEl.textContent = rem > 0 ? rem : "";
      progressBar.style.width = ((DURATION - rem) / DURATION * 100) + "%";
      if(rem <= 0) {
        clearInterval(timer);
        mediaRec.stop();
        countdownEl.classList.remove("visible");
        viewfinder.classList.remove("is-recording");
      }
    }, 1000);
  };

  document.getElementById("retryBtn").onclick = () => location.reload();

  document.getElementById("submitBtn").onclick = async () => {
    uploadStatus.textContent = "Uploading Magic... ✨";
    const form = new FormData();
    form.append("video", videoBlob, "vid.webm");
    try {
      const res = await fetch("/upload-video", { method: "POST", body: form });
      if(res.ok) {
        uploadStatus.textContent = "Sent Successfully! ✅";
        setTimeout(() => window.location.href="/audio-letters", 1000);
      }
    } catch(e) { uploadStatus.textContent = "Error! ❌"; }
  };

  init();
</script>

</body>
</html>
