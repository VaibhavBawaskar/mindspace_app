<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audio — Letter Reading</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --accent: #6366f1;
      --accent-glow: rgba(99,102,241,0.15);
      --text: #1e293b;
      --muted: #64748b;
      --green: #10b981;
      --danger: #ef4444;
    }

   .visualizer-container {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 3px;
  height: 80px;
  position: relative; /* रेघ ठेवण्यासाठी आवश्यक */
}

/* मध्यभागी असलेली पांढरी/निळी रेघ */
.visualizer-container::after {
  content: '';
  position: absolute;
  left: 10%;
  right: 10%;
  height: 1px;
  background: rgba(99, 102, 241, 0.4); /* फिकट निळा रंग */
  box-shadow: 0 0 5px rgba(99, 102, 241, 0.8);
  z-index: 1;
  pointer-events: none;
}

.bar {
  width: 4px;
  height: 4px;
  background: linear-gradient(to bottom, #6366f1, #a855f7);
  border-radius: 10px;
  transition: height 0.05s ease;
  position: relative;
  z-index: 2; /* रेघेच्या वर दिसण्यासाठी */
}
    body {
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: 'Segoe UI', Roboto, sans-serif;
      padding: 40px 0;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: linear-gradient(rgba(99,102,241,.03) 1px, transparent 1px), linear-gradient(90deg, rgba(99,102,241,.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .wrap {
      width: 100%; max-width: 480px;
      display: flex; flex-direction: column; align-items: center;
      gap: 2rem; padding: 2rem 1.25rem;
      position: relative; z-index: 1;
    }

    .header { text-align: center; }
    .header h2 { font-size: 1.25rem; font-weight: 700; color: #0f172a; }
    .header p  { font-size: .875rem; color: var(--muted); margin-top: .35rem; }

    .rec-badge {
      display: flex; align-items: center; gap: .4rem;
      font-size: .75rem; font-weight: 700;
      text-transform: uppercase;
      padding: .4rem 1rem; border-radius: 999px;
      border: 1px solid var(--border);
      background: #fff; color: var(--muted);
    }
    .rec-badge.live { color: #dc2626; border-color: #fecaca; background: #fef2f2; }
    .rec-dot { width: 8px; height: 8px; border-radius: 50%; background: #dc2626; opacity: 0; }
    .rec-badge.live .rec-dot { opacity: 1; animation: blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .stage {
      width: 100%; height: 220px;
      position: relative;
      display: flex; align-items: center; justify-content: center;
    }

    .ghost-strip {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      gap: 1.5rem; opacity: .06;
      font-family: 'Noto Sans Devanagari', serif;
      font-size: 1.5rem; color: var(--accent);
      pointer-events: none; white-space: nowrap;
    }

    .letter-card {
      position: absolute;
      display: flex; align-items: center; justify-content: center;
      width: 160px; height: 160px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 1.5rem;
      font-family: 'Noto Sans Devanagari', serif;
      font-size: 5.5rem; font-weight: 700;
      color: var(--text);
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
      transition: all .4s cubic-bezier(.4,0,.2,1);
      z-index: 2;
    }
    .letter-card.active { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-glow); }

    .letter-card.enter-from-right { transform: translateX(120%) scale(.85); opacity: 0; }
    .letter-card.center { transform: translateX(0) scale(1); opacity: 1; }
    .letter-card.exit-to-left { transform: translateX(-120%) scale(.85); opacity: 0; }

    .ring-wrap {
      position: absolute; width: 190px; height: 190px;
      top: 50%; left: 50%; transform: translate(-50%, -50%);
    }
    .ring-wrap svg { transform: rotate(-90deg); }
    #ringTrack { stroke: #e2e8f0; }
    #ringFill  { stroke: var(--accent); stroke-dasharray: 502; stroke-dashoffset: 502; transition: stroke-dashoffset 0.1s linear; }

    .dots { display: flex; gap: .4rem; flex-wrap: wrap; justify-content: center; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #cbd5e1; transition: 0.3s; }
    .dot.done { background: var(--green); }
    .dot.active { background: var(--accent); transform: scale(1.3); }

    .counter { font-size: .85rem; font-weight: 600; color: var(--muted); }

    .btn-start, .btn-stop, .btn-upload {
      font-weight: 700; font-size: 1rem;
      padding: .8rem 3.5rem; border-radius: .75rem; cursor: pointer;
      border: none; transition: 0.2s;
    }
    .btn-start { background: var(--accent); color: #fff; box-shadow: 0 4px 12px rgba(99,102,241, 0.3); }
    .btn-stop { background: var(--danger); color: #fff; display: none; }
    .btn-upload { background: #059669; color: #fff; width: 100%; margin-top: 10px; }

    .instruction {
      text-align: center; font-size: .85rem; color: var(--muted);
      border: 1px solid var(--border); border-radius: .75rem;
      padding: .8rem; background: #fff; width: 100%;
    }

    #doneSection {
      display: none; width: 100%; flex-direction: column; align-items: center;
      gap: 1rem; padding: 1.5rem; background: #f1f5f9; border-radius: 1rem; border: 1px dashed #cbd5e1;
    }
    .done-banner { background: #dcfce7; border: 1px solid #86efac; border-radius: .75rem; padding: .75rem; text-align: center; color: #166534; font-weight: 700; width: 100%; }
  </style>
  {% include 'chat_bot.html' %}
</head>
<body>

<div class="wrap">
  <div class="header">
    <h2>🎙️ Read Each Letter</h2>
    <p>Speak each letter clearly as it appears.</p>
  </div>

  <div class="rec-badge" id="recBadge">
    <span class="rec-dot"></span> Recording
  </div>

  <div class="stage">
    <div class="ghost-strip">अ इ उ ए ओ अं अः ट श ष स च य र ल थ व ड ञ द ण न म ह ख</div>
    <div class="ring-wrap">
      <svg width="184" height="184" viewBox="0 0 184 184">
        <circle id="ringTrack" cx="92" cy="92" r="80" stroke-width="3" fill="none"/>
        <circle id="ringFill"  cx="92" cy="92" r="80" stroke-width="3" fill="none" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="letter-card enter-from-right" id="letterCard">—</div>
  </div>

  <div class="dots" id="dots"></div>
  <div class="counter" id="counter">0 / 25</div>

  <div class="instruction" id="instruction">
    Please allow microphone access to start.
  </div>
  <div class="mic-section">
    <div class="visualizer-container" id="visualizer">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>
  </div>

  <button class="btn-start" id="startBtn" disabled>▶ Start Recording</button>
  <button class="btn-stop" id="stopBtn">🛑 Stop Recording</button>

  <div id="doneSection">
    <div class="done-banner">✅ All letters recorded!</div>
    <button class="btn-upload" id="uploadBtn">Upload &amp; Continue →</button>
    <div class="upload-status" id="uploadStatus"></div>
  </div>
</div>

<script>
  const LETTERS = ["अ","इ","उ","ए","ओ","अं","अः","ट","श","ष","स","च","य","र","ल","थ","व","ड","ञ","द","ण","न","म","ह","ख"];
const SEC_PER_LETTER = 4;
const RING_CIRCUM = 2 * Math.PI * 80;

let stream, mediaRec, chunks = [], audioBlob, currentIdx = -1, ringTimer;
// नवीन व्हिज्युअलायझर व्हेरिएबल्स
let audioCtx, analyser, dataArray, animationId;

const card = document.getElementById("letterCard"),
      recBadge = document.getElementById("recBadge"),
      ringFill = document.getElementById("ringFill"),
      dotsWrap = document.getElementById("dots"),
      counter = document.getElementById("counter"),
      instruction = document.getElementById("instruction"),
      startBtn = document.getElementById("startBtn"),
      stopBtn = document.getElementById("stopBtn"),
      doneSection = document.getElementById("doneSection"),
      uploadBtn = document.getElementById("uploadBtn"),
      uploadStatus = document.getElementById("uploadStatus"),
      bars = document.querySelectorAll(".bar");

// Build dots
LETTERS.forEach((_, i) => {
  const d = document.createElement("div");
  d.className = "dot";
  d.id = `dot-${i}`;
  dotsWrap.appendChild(d);
});

async function getMic() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    startBtn.disabled = false;
    instruction.innerHTML = "Speak now. <strong>4s</strong> per character.";
  } catch {
    instruction.textContent = "⚠️ Microphone access denied.";
  }
}

// --- 🎤 माईक इफेक्ट (Visualizer) चे फंक्शन ---
// --- 🎤 FM Radio Wave Effect (Symmetric) ---
function startVisualizer() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  const source = audioCtx.createMediaStreamSource(stream);
  analyser = audioCtx.createAnalyser();

  // FM लहरींसाठी fftSize ६४ किंवा १२८ सर्वोत्तम असतो
  analyser.fftSize = 64;
  source.connect(analyser);

  dataArray = new Uint8Array(analyser.frequencyBinCount);

  function draw() {
    animationId = requestAnimationFrame(draw);
    analyser.getByteFrequencyData(dataArray);

    bars.forEach((bar, i) => {
      // आवाजाची तीव्रता मॅप करणे (० ते ८०px च्या दरम्यान)
      let val = (dataArray[i] / 255) * 80;

      // FM रेडिओ लहरींसारखा इफेक्ट: दोन्ही बाजूला वाढणे
      // CSS मध्ये 'align-items: center' असल्यामुळे हे शक्य होते
      let finalHeight = Math.max(4, val * 1.5);

      bar.style.height = finalHeight + "px";

      // निऑन ग्लो इफेक्ट (आवाजाप्रमाणे चमक वाढवणे)
      bar.style.opacity = Math.max(0.4, val / 40);
      bar.style.boxShadow = `0 0 ${val/4}px rgba(99, 102, 241, 0.8)`;
    });
  }
  draw();
}

function showLetter(index) {
  if (index >= LETTERS.length) {
    finishSession();
    return;
  }
  currentIdx = index;
  counter.textContent = `${index + 1} / ${LETTERS.length}`;

  document.querySelectorAll('.dot').forEach((d, i) => {
    d.className = "dot" + (i < index ? " done" : i === index ? " active" : "");
  });

  card.className = "letter-card exit-to-left";
  setTimeout(() => {
    card.style.transition = "none";
    card.textContent = LETTERS[index];
    card.className = "letter-card enter-from-right";
    void card.offsetHeight;
    card.style.transition = "";
    card.className = "letter-card center active";
  }, 400);

  let start = Date.now();
  clearInterval(ringTimer);
  ringTimer = setInterval(() => {
    let elapsed = Date.now() - start;
    let progress = Math.min(1, elapsed / (SEC_PER_LETTER * 1000));
    ringFill.style.strokeDashoffset = RING_CIRCUM * (1 - progress);
    if (progress >= 1) {
      clearInterval(ringTimer);
      showLetter(index + 1);
    }
  }, 50);
}

async function startSession() {
  startBtn.style.display = "none";
  stopBtn.style.display = "block";
  chunks = [];

  // माईक व्हिज्युअलायझर सुरू करा
  startVisualizer();

  mediaRec = new MediaRecorder(stream);
  mediaRec.ondataavailable = e => chunks.push(e.data);
  mediaRec.onstop = () => {
    audioBlob = new Blob(chunks, { type: 'audio/webm' });
    doneSection.style.display = "flex";
  };
  mediaRec.start();
  recBadge.classList.add("live");
  instruction.textContent = "Recording... Speak clearly.";
  showLetter(0);
}

function finishSession() {
  clearInterval(ringTimer);
  // व्हिज्युअलायझर थांबवा
  cancelAnimationFrame(animationId);
  bars.forEach(bar => bar.style.height = "4px"); // बार्स रिसेट करा

  if (mediaRec && mediaRec.state !== "inactive") mediaRec.stop();
  stopBtn.style.display = "none";
  recBadge.classList.remove("live");
  card.textContent = "✓";
  card.style.color = "#10b981";
  instruction.textContent = "Recording Complete!";
}

startBtn.addEventListener("click", startSession);
stopBtn.addEventListener("click", finishSession);
getMic();

  async function uploadAudio() {
    uploadBtn.disabled = true;
    uploadStatus.textContent = "⏳ Uploading...";
    const form = new FormData();
    form.append("audio", audioBlob, "letters.webm");

    try {
      // Note: This endpoint must exist on your server
      const res = await fetch("/upload-audio-letters", { method: "POST", body: form });
      if (res.ok) {
        uploadStatus.textContent = "✅ Uploaded Successfully!";
        setTimeout(() => {
          window.location.href = "/audio-scenario"; // इथे तुमच्या पुढच्या पेजचे नाव टाका
        }, 1500);
      } else {
        throw new Error();
      }
    } catch {
      uploadStatus.textContent = "❌ Upload failed. Check connection.";
      uploadBtn.disabled = false;
    }
  }

  startBtn.addEventListener("click", startSession);
  stopBtn.addEventListener("click", finishSession);
  uploadBtn.addEventListener("click", uploadAudio);
  getMic();
</script>

</body>
</html>
