<button id="chat-btn" style="position:fixed; bottom:20px; right:20px; width:60px; height:60px; border-radius:50%; background:#6366f1; border:none; color:white; font-size:28px; cursor:pointer; z-index:2000; box-shadow:0 4px 15px rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; transition: transform 0.3s ease;">
    🤖
</button>

<div id="chat-window" style="display:none; position:fixed; bottom:90px; right:20px; width:330px; height:480px; background:white; border-radius:15px; flex-direction:column; box-shadow:0 10px 30px rgba(0,0,0,0.2); z-index:2000; overflow:hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; border: 1px solid #e2e8f0;">

    <div style="background:#6366f1; color:white; padding:15px; font-weight:bold; display:flex; justify-content:space-between; align-items:center;">
        <div style="display: flex; align-items: center; gap: 10px;">
            <span style="font-size: 20px;">🤖</span>
            <span>MindSpace AI</span>
        </div>
        <span id="close-chat" style="cursor:pointer; font-size: 24px; line-height: 1;">&times;</span>
    </div>

    <div id="chat-content" style="flex:1; padding:15px; overflow-y:auto; font-size:14px; display:flex; flex-direction:column; gap:12px; background: #fcfcfc;">
        <div style="background:#f1f5f9; color: #334155; padding:10px 14px; border-radius:12px 12px 12px 0; align-self:flex-start; max-width: 85%; line-height: 1.4; box-shadow: 0 1px 2px rgba(0,0,0,0.05);">
            Hello {{ user_name }}! I am MindSpace AI. How can I help you today? 😊
        </div>
    </div>

    <div style="padding:15px; border-top:1px solid #f1f5f9; display:flex; gap:8px; background: white;">
        <input type="text" id="user-input" placeholder="Type your message..." style="flex:1; border:1px solid #e2e8f0; padding:10px 15px; border-radius:25px; outline:none; font-size: 14px; transition: border 0.2s;">
        <button id="send-btn" style="background:#6366f1; color:white; border:none; width: 40px; height: 40px; border-radius:50%; cursor:pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s;">
            <span style="font-size: 18px;">➤</span>
        </button>
    </div>
</div>

<script>
    (function() {
        const chatBtn = document.getElementById('chat-btn');
        const chatWindow = document.getElementById('chat-window');
        const closeChat = document.getElementById('close-chat');
        const sendBtn = document.getElementById('send-btn');
        const userInput = document.getElementById('user-input');
        const chatContent = document.getElementById('chat-content');

        // Toggle chat window
        chatBtn.onclick = () => {
            const isHidden = chatWindow.style.display === 'none';
            chatWindow.style.display = isHidden ? 'flex' : 'none';
            if(isHidden) userInput.focus();
        };

        closeChat.onclick = () => chatWindow.style.display = 'none';

        // Send Message Function
        async function sendMessage() {
            const msg = userInput.value.trim();
            if (!msg) return;

            // Display User Message
            chatContent.innerHTML += `
                <div style="background:#6366f1; color:white; padding:10px 14px; border-radius:12px 12px 0 12px; align-self:flex-end; max-width: 85%; box-shadow: 0 2px 4px rgba(99, 102, 241, 0.2);">
                    ${msg}
                </div>`;

            userInput.value = '';
            chatContent.scrollTop = chatContent.scrollHeight;

            // Show Typing Indicator
            const typingId = 'typing-' + Date.now();
            chatContent.innerHTML += `
                <div id="${typingId}" style="background:#f1f5f9; color: #64748b; padding:10px 14px; border-radius:12px 12px 12px 0; align-self:flex-start; font-style: italic;">
                    Thinking... ✨
                </div>`;
            chatContent.scrollTop = chatContent.scrollHeight;

            try {
                const response = await fetch('/ask-ai', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ message: msg })
                });
                const data = await response.json();

                // Remove Indicator and Show AI Reply
                const typingElem = document.getElementById(typingId);
                if(typingElem) typingElem.remove();

                chatContent.innerHTML += `
                    <div style="background:#f1f5f9; color: #1e293b; padding:10px 14px; border-radius:12px 12px 12px 0; align-self:flex-start; max-width: 85%; line-height: 1.5; box-shadow: 0 1px 2px rgba(0,0,0,0.05);">
                        ${data.reply}
                    </div>`;
                chatContent.scrollTop = chatContent.scrollHeight;

            } catch (error) {
                const typingElem = document.getElementById(typingId);
                if(typingElem) typingElem.innerText = "Error: Could not connect to server.";
            }
        }

        sendBtn.onclick = sendMessage;
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    })();
</script>
