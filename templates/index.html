<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Registration | Premium</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />

  <style>
    :root {
      --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
      --body-bg: #f8fafc;
    }

    body {
      background: var(--body-bg);
      font-family: 'Inter', sans-serif;
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      align-items: center;
    }

    /* Background Decoration */
    .bg-circle {
      position: fixed;
      z-index: -1;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
    }

    .circle-1 { width: 300px; height: 300px; background: #6366f1; top: -50px; left: -50px; }
    .circle-2 { width: 400px; height: 400px; background: #a855f7; bottom: -100px; right: -50px; }

    .card {
      border: none;
      border-radius: 1.5rem;
      box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
    }

    .card-header-custom {
      background: var(--primary-gradient);
      padding: 2.5rem 1rem;
      border-radius: 1.5rem 1.5rem 0 0;
      text-align: center;
      color: white;
    }

    .form-label {
      font-weight: 600;
      font-size: 0.85rem;
      color: #475569;
      margin-bottom: 0.5rem;
    }

    .form-control, .form-select {
      border: 1.5px solid #e2e8f0;
      border-radius: 0.75rem;
      padding: 0.75rem 1rem;
      transition: all 0.2s ease;
    }

    .form-control:focus, .form-select:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
    }

    .btn-primary {
      background: var(--primary-gradient);
      border: none;
      border-radius: 0.75rem;
      padding: 0.8rem;
      font-weight: 600;
      transition: transform 0.2s ease;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
    }

    .btn-outline-secondary {
      border-radius: 0.75rem;
      border: 1.5px solid #e2e8f0;
      color: #64748b;
    }

    .form-footer {
      border-top: 1px solid #f1f5f9;
      margin-top: 2rem;
      padding-top: 1.5rem;
    }

    .alert { border-radius: 1rem; border: none; }
  </style>
</head>
<body>

<div class="bg-circle circle-1"></div>
<div class="bg-circle circle-2"></div>

<div class="container py-5" style="max-width:550px;">

  {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
  {% for cat, msg in messages %}
  <div class="alert alert-{{ cat }} alert-dismissible fade show shadow-sm">
    {{ msg }}
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  {% endfor %}
  {% endif %}
  {% endwith %}

  <div class="card">
    <div class="card-header-custom">
      <h3 class="fw-bold mb-1">Create Account</h3>
      <p class="mb-0 opacity-75 small">Join our community today</p>
    </div>

    <div class="card-body p-4 p-md-5">
      <form method="POST" action="/submit" id="regForm">

        <div class="row g-4">
          <div class="col-md-6">
            <label class="form-label">First Name</label>
            <input type="text" name="first_name" class="form-control" placeholder="First Name" required />
          </div>
          <div class="col-md-6">
            <label class="form-label">Last Name</label>
            <input type="text" name="last_name" class="form-control" placeholder="Last Name" required />
          </div>

          <div class="col-12">
            <label class="form-label">Email Address</label>
            <input type="email" name="email" class="form-control" placeholder="name@example.com" required />
          </div>

          <div class="col-12">
            <label class="form-label">Phone Number</label>
            <input type="tel" name="phone" class="form-control" placeholder="+91 00000 00000" required />
          </div>

          <div class="col-md-6">
            <label class="form-label">Date of Birth</label>
            <input type="date" name="dob" class="form-control" />
          </div>

          <div class="col-md-6">
            <label class="form-label">Gender</label>
            <select name="gender" class="form-select">
              <option value="" selected disabled>Select</option>
              <option value="male">Male</option>
              <option value="female">Female</option>
              <option value="other">Other</option>
            </select>
          </div>

          <div class="col-12">
            <label class="form-label">City</label>
            <input type="text" name="city" class="form-control" placeholder="Mumbai" />
          </div>
        </div>

        <div class="d-grid gap-2 mt-5">
          <button type="submit" class="btn btn-primary text-white">Complete Registration</button>
          <button type="reset" class="btn btn-outline-secondary">Clear All</button>
        </div>

      </form>

      <div class="form-footer text-center">
        <p class="mb-0 small">
          <a href="/users" class="text-decoration-none fw-medium" style="color: #6366f1;">
            View all registered users <span class="ms-1">→</span>
          </a>
        </p>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
