<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <style>
        :root { --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); --body-bg: #f8fafc; }
        body { background: var(--body-bg); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; }
        .bg-circle { position: fixed; z-index: -1; border-radius: 50%; filter: blur(80px); opacity: 0.4; }
        .circle-1 { width: 300px; height: 300px; background: #6366f1; top: -50px; left: -50px; }
        .circle-2 { width: 400px; height: 400px; background: #a855f7; bottom: -100px; right: -50px; }
        .card { border: none; border-radius: 1.5rem; box-shadow: 0 20px 25px rgba(0,0,0,0.1); background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .card-header-custom { background: var(--primary-gradient); padding: 2.5rem 1rem; border-radius: 1.5rem 1.5rem 0 0; text-align: center; color: white; }
        .form-control { border: 1.5px solid #e2e8f0; border-radius: 0.75rem; padding: 0.75rem 1rem; }
        .btn-primary { background: var(--primary-gradient); border: none; border-radius: 0.75rem; padding: 0.8rem; font-weight: 600; }
        .alert { border-radius: 0.75rem; border: none; font-size: 0.9rem; }
    </style>
    {% include 'chat_bot.html' %}
</head>
<body>

<div class="bg-circle circle-1"></div>
<div class="bg-circle circle-2"></div>

<div class="container" style="max-width:450px;">

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    {% for category, message in messages %}
    <div class="alert alert-{{ category }} alert-dismissible fade show shadow-sm mb-4" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    {% endfor %}
    {% endif %}
    {% endwith %}

    <div class="card">
        <div class="card-header-custom">
            <h3 class="fw-bold mb-1">Welcome Back</h3>
            <p class="mb-0 opacity-75 small">Login to your account</p>
        </div>
        <div class="card-body p-4 p-md-5">
            <form method="POST" action="/login">
                <div class="mb-4">
                    <label class="form-label fw-bold small text-muted">Email Address</label>
                    <input type="email" name="email" class="form-control" placeholder="name@example.com" required />
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold small text-muted">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required />
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary text-white">Sign In</button>
                </div>
            </form>
            <div class="text-center mt-4">
                <p class="small mb-0">Don't have an account? <a href="/" class="text-decoration-none fw-bold" style="color: #6366f1;">Register</a></p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
